<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Echo Registry</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0d0d0d;
  color: #e0e0e0;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 13px;
  min-height: 100vh;
}

/* ── HEADER ── */
header {
  padding: 18px 28px 0;
  border-bottom: 1px solid #1a1a1a;
}
.header-top {
  display: flex;
  align-items: baseline;
  gap: 14px;
  margin-bottom: 14px;
}
header h1 { font-size: 18px; font-weight: 600; color: #fff; }
header .sub { color: #444; font-size: 11px; }

/* ── SEARCH ── */
.search-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}
.search-wrap { position: relative; flex: 1; max-width: 500px; }
.search-wrap input {
  width: 100%;
  background: #141414;
  border: 1px solid #222;
  color: #e0e0e0;
  padding: 7px 12px 7px 30px;
  border-radius: 5px;
  font-size: 13px;
  font-family: inherit;
  outline: none;
}
.search-wrap input:focus { border-color: #3a3a3a; }
.search-wrap .sicon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: #444; }
.search-clear {
  background: none; border: none; color: #444; cursor: pointer; font-size: 16px; padding: 0 4px;
  display: none;
}
.search-clear.visible { display: block; }
#global-match { font-size: 11px; color: #555; white-space: nowrap; }

/* ── TABS ── */
.tabs {
  display: flex;
  gap: 0;
  overflow-x: auto;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  padding: 8px 16px;
  cursor: pointer;
  color: #555;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  font-size: 12px;
  transition: color 0.15s;
  user-select: none;
}
.tab:hover { color: #999; }
.tab.active { color: #e0e0e0; border-bottom-color: #5a9a5a; }
.tab .count { color: #333; margin-left: 5px; font-size: 11px; }
.tab.active .count { color: #555; }

/* ── SECTION VIEWS ── */
.section { display: none; padding: 0; }
.section.active { display: block; }

/* ── TOOLBAR ── */
.toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 28px;
  border-bottom: 1px solid #151515;
  flex-wrap: wrap;
}
.toolbar-info { color: #444; font-size: 11px; flex: 1; }
.sort-select {
  background: #141414;
  border: 1px solid #222;
  color: #888;
  padding: 4px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-family: inherit;
  outline: none;
  cursor: pointer;
}
.filter-chips { display: flex; gap: 5px; flex-wrap: wrap; }
.chip {
  background: #141414;
  border: 1px solid #1e1e1e;
  color: #666;
  padding: 3px 9px;
  border-radius: 12px;
  cursor: pointer;
  font-size: 11px;
  transition: all 0.12s;
}
.chip:hover { border-color: #333; color: #aaa; }
.chip.active { background: #1a2e1a; border-color: #3a6a3a; color: #7aba7a; }

/* ── TABLE VIEW (Entities, Channels, Assets) ── */
.table-wrap { overflow-x: auto; }
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
th {
  text-align: left;
  padding: 8px 12px;
  color: #444;
  border-bottom: 1px solid #1a1a1a;
  font-weight: 500;
  background: #0d0d0d;
  white-space: nowrap;
  cursor: pointer;
  user-select: none;
}
th:hover { color: #777; }
th .sort-arrow { margin-left: 4px; opacity: 0.4; }
th.sorted .sort-arrow { opacity: 1; color: #7aba7a; }
td {
  padding: 7px 12px;
  border-bottom: 1px solid #111;
  vertical-align: top;
  max-width: 280px;
}
tr:hover td { background: #111; }
tr.expanded td { background: #0f1a0f; }
.td-name { color: #ccc; font-weight: 500; cursor: pointer; }
.td-name:hover { color: #fff; }
.td-muted { color: #555; }
.td-wrap { white-space: pre-wrap; word-break: break-word; }

/* Badges */
.badge {
  display: inline-block;
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 3px;
  font-weight: 500;
  white-space: nowrap;
}
.b-person   { background:#1a2535; color:#7ab3d4; }
.b-agent    { background:#1a2535; color:#a07ad4; }
.b-org      { background:#1e2a1e; color:#7ab393; }
.b-place    { background:#2a2a1a; color:#c4b96a; }
.b-default  { background:#1e1e1e; color:#666; }
.b-active   { background:#1a2e1a; color:#5a9a5a; }
.b-done     { background:#1a1e2e; color:#4a6a9a; }
.b-pending  { background:#2e2a1a; color:#9a8a4a; }
.b-inactive { background:#1e1a1a; color:#555; }
.b-high     { background:#2e1a1a; color:#c46a6a; }
.b-medium   { background:#2a2a1a; color:#a49a5a; }
.b-low      { background:#1a1e1a; color:#5a7a5a; }
.b-gap      { background:#2e1a1a; color:#c44a4a; border: 1px solid #5a1a1a; }

/* ── ROW EXPAND ── */
.row-detail {
  display: none;
}
.row-detail.open {
  display: table-row;
}
.row-detail td {
  background: #0a120a !important;
  padding: 12px 16px 14px 28px;
  border-bottom: 1px solid #1a2a1a;
}
.detail-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 8px 24px;
}
.detail-field { font-size: 11px; }
.detail-key { color: #3a3a3a; margin-bottom: 2px; }
.detail-val { color: #aaa; white-space: pre-wrap; word-break: break-word; line-height: 1.4; }
.detail-val.gap-val { color: #c44a4a; }
.detail-actions { margin-top: 10px; }

/* ── CARDS VIEW (Positions, Commitments) ── */
.cards-grid {
  padding: 14px 28px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 8px;
}
.card {
  background: #111;
  border: 1px solid #1a1a1a;
  border-radius: 7px;
  padding: 13px 14px;
  cursor: pointer;
  transition: border-color 0.12s;
}
.card:hover { border-color: #2a2a2a; }
.card.open { border-color: #2a4a2a; background: #0f140f; }
.card-head { display: flex; justify-content: space-between; gap: 8px; align-items: flex-start; margin-bottom: 6px; }
.card-title { color: #ccc; font-weight: 600; font-size: 13px; line-height: 1.3; }
.card-badges { display: flex; gap: 4px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
.card-body { color: #555; font-size: 12px; line-height: 1.45; }
.card-body.full { color: #aaa; }
.card-expand { display: none; margin-top: 10px; border-top: 1px solid #1a2a1a; padding-top: 10px; }
.card.open .card-expand { display: block; }
.card.open .card-body:not(.full) { display: none; }
.cfield { margin-bottom: 6px; font-size: 11px; }
.cfield-key { color: #333; }
.cfield-val { color: #999; white-space: pre-wrap; word-break: break-word; }
.cfield-val.gap-val { color: #c44a4a; }

/* ── BTN GAP ── */
.btn-gap {
  background: none;
  border: 1px solid #2a1a1a;
  color: #7a3a3a;
  padding: 3px 9px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 11px;
  font-family: inherit;
  margin-top: 8px;
}
.btn-gap:hover { border-color: #5a2a2a; color: #cc6a6a; }

/* ── MODAL ── */
.modal-bg {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.85);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
.modal-bg.open { display: flex; }
.modal-box {
  background: #131313;
  border: 1px solid #2a2a2a;
  border-radius: 9px;
  padding: 22px;
  width: 100%;
  max-width: 460px;
  margin: 16px;
}
.modal-box h3 { color: #ccc; margin-bottom: 4px; font-size: 14px; }
.modal-box .mobj { color: #666; font-size: 11px; margin-bottom: 12px; }
.modal-box p { color: #444; font-size: 11px; margin-bottom: 10px; }
.modal-box p a { color: #7ab3d4; text-decoration: none; }
.modal-box textarea {
  width: 100%;
  background: #0d0d0d;
  border: 1px solid #222;
  color: #ccc;
  padding: 9px;
  border-radius: 5px;
  font-size: 12px;
  font-family: inherit;
  resize: vertical;
  min-height: 70px;
  outline: none;
  margin-bottom: 10px;
}
.modal-btns { display: flex; gap: 7px; justify-content: flex-end; }
.mbtn-copy {
  background: #1a2e1a; border: 1px solid #3a6a3a; color: #7aba7a;
  padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 11px; font-family: inherit;
}
.mbtn-cancel {
  background: none; border: 1px solid #222; color: #555;
  padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 11px; font-family: inherit;
}

/* ── EMPTY / FOOTER ── */
.empty { padding: 50px 28px; text-align: center; color: #2a2a2a; font-size: 18px; }
footer {
  padding: 18px 28px;
  border-top: 1px solid #111;
  color: #2a2a2a;
  font-size: 11px;
  display: flex;
  justify-content: space-between;
}
footer a { color: #3a3a3a; text-decoration: none; }
footer a:hover { color: #777; }

mark { background: #3a3a12; color: #ddc050; border-radius: 2px; }

@media (max-width:600px) {
  header, .toolbar, .cards-grid, footer { padding-left: 14px; padding-right: 14px; }
  .cards-grid { grid-template-columns: 1fr; }
  table { font-size: 11px; }
  td, th { padding: 6px 8px; }
}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>🌀 Echo Registry</h1>
    <span class="sub" id="hdr-sub">загрузка...</span>
  </div>
  <div class="search-row">
    <div class="search-wrap">
      <span class="sicon">⌕</span>
      <input type="text" id="gsearch" placeholder="Глобальный поиск по всем таблицам..." autocomplete="off">
    </div>
    <button class="search-clear" id="sclear" onclick="clearSearch()">✕</button>
    <span id="global-match"></span>
  </div>
  <div class="tabs" id="tabs"></div>
</header>

<!-- Sections rendered here -->
<div id="sections"></div>

<!-- Footer -->
<footer>
  <div>Данные: <a href="https://montelibero.getgrist.com/8tr2cqDjxtKA9RzGSaVDS5" target="_blank">Grist</a> · <a href="https://t.me/echo_mtl" target="_blank">@echo_mtl</a></div>
  <div><a href="index.html">← на главную</a></div>
</footer>

<!-- Gap modal -->
<div class="modal-bg" id="gap-modal">
  <div class="modal-box">
    <h3>📝 Сообщить о дыре</h3>
    <div class="mobj" id="gap-obj"></div>
    <p>Скопируйте и отправьте в <a href="https://t.me/Echo_MTL_bot" target="_blank">@Echo_MTL_bot</a></p>
    <textarea id="gap-text" readonly></textarea>
    <div class="modal-btns">
      <button class="mbtn-cancel" onclick="closeGap()">Закрыть</button>
      <button class="mbtn-copy" id="gap-copy-btn" onclick="copyGap()">Скопировать</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────
const TABLES = [
  { id: 'Entities',    label: 'Люди & орги',     view: 'table',  icon: '👤' },
  { id: 'Assets2',     label: 'Активы',           view: 'table',  icon: '💎' },
  { id: 'Commitments', label: 'Обязательства',    view: 'cards',  icon: '📌' },
  { id: 'Projects',    label: 'Проекты',          view: 'table',  icon: '🗂' },
  { id: 'Positions',   label: 'Позиции',          view: 'cards',  icon: '🧭' },
  { id: 'Channels',    label: 'Каналы',           view: 'table',  icon: '📡' },
];

// Колонки для table-view
const COLUMNS = {
  Entities:    [{k:'name',l:'Имя'}, {k:'type',l:'Тип'}, {k:'trust_level',l:'Доверие'}, {k:'strategic_value',l:'Ценность'}, {k:'telegram',l:'Telegram'}],
  Assets2:     [{k:'name',l:'Актив'}, {k:'type',l:'Тип'}, {k:'status',l:'Статус'}, {k:'value',l:'Значение'}, {k:'location',l:'Где'}],
  Projects:    [{k:'name',l:'Проект'}, {k:'status',l:'Статус'}, {k:'priority',l:'Приоритет'}, {k:'strategy_axis',l:'Стратегия'}, {k:'metrics',l:'Метрики'}],
  Channels:    [{k:'name',l:'Канал'}, {k:'platform',l:'Платформа'}, {k:'type',l:'Тип'}, {k:'access',l:'Доступ'}, {k:'strategic_value',l:'Ценность'}],
};

// Главное поле и описание для card-view
const CARD_CFG = {
  Commitments: { title: 'description', body: 'notes', badges: ['status','priority','strategy_axis'] },
  Positions:   { title: 'topic',       body: 'position', badges: ['status','source'] },
};

// Фильтры по статусу для каждой таблицы
const STATUS_FILTERS = {
  Entities:    { field: 'trust_level', values: [] },
  Assets2:     { field: 'status',      values: ['active','inactive','pending'] },
  Commitments: { field: 'status',      values: ['open','done','in_progress'] },
  Projects:    { field: 'status',      values: ['active','done','stalled'] },
  Positions:   { field: 'status',      values: [] },
  Channels:    { field: 'access',      values: [] },
};

// ── STATE ────────────────────────────────────────────────────────────
let DATA = {};
let activeTab = TABLES[0].id;
let globalQuery = '';
let sectionState = {};  // { tableId: { filterVal, sortCol, sortDir } }

TABLES.forEach(t => {
  sectionState[t.id] = { filterVal: 'all', sortCol: null, sortDir: 'asc' };
});

// ── LOAD ─────────────────────────────────────────────────────────────
async function loadRegistry() {
  try {
    const r = await fetch('data/registry.json?t=' + Date.now());
    DATA = await r.json();
    const total = Object.values(DATA).reduce((s,a) => s + a.length, 0);
    document.getElementById('hdr-sub').textContent =
      `${total} объектов · 6 таблиц · обновляется ежедневно`;
    buildUI();
  } catch(e) {
    document.getElementById('sections').innerHTML =
      '<div class="empty">⚠ Не удалось загрузить реестр</div>';
  }
}

// ── BUILD UI ─────────────────────────────────────────────────────────
function buildUI() {
  buildTabs();
  buildSections();
  activateTab(activeTab);
}

function buildTabs() {
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = TABLES.map(t => {
    const n = (DATA[t.id] || []).length;
    return `<div class="tab" data-id="${t.id}" onclick="activateTab('${t.id}')">
      ${t.icon} ${t.label} <span class="count">${n}</span>
    </div>`;
  }).join('');
}

function activateTab(id) {
  activeTab = id;
  document.querySelectorAll('.tab').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });
  document.querySelectorAll('.section').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });
  renderSection(id);
}

function buildSections() {
  const container = document.getElementById('sections');
  container.innerHTML = TABLES.map(t =>
    `<div class="section" data-id="${t.id}" id="sec-${t.id}"></div>`
  ).join('');
}

function renderSection(id) {
  const tCfg = TABLES.find(t => t.id === id);
  const el = document.getElementById('sec-' + id);
  if (!el) return;

  const records = filterRecords(id);

  if (tCfg.view === 'table') {
    el.innerHTML = renderTableView(id, records);
  } else {
    el.innerHTML = renderCardsView(id, records);
  }
  attachEvents(id);
}

// ── FILTER + SEARCH ───────────────────────────────────────────────────
function filterRecords(id) {
  let recs = DATA[id] || [];
  const st = sectionState[id];
  const sf = STATUS_FILTERS[id];

  // статус-фильтр
  if (st.filterVal && st.filterVal !== 'all' && sf) {
    recs = recs.filter(r => {
      const v = String(r[sf.field] || '').toLowerCase();
      return v === st.filterVal.toLowerCase() || v.includes(st.filterVal.toLowerCase());
    });
  }

  // глобальный поиск
  if (globalQuery) {
    const q = globalQuery.toLowerCase();
    recs = recs.filter(r =>
      Object.values(r).some(v => v && String(v).toLowerCase().includes(q))
    );
  }

  // сортировка
  if (st.sortCol) {
    const dir = st.sortDir === 'asc' ? 1 : -1;
    recs = [...recs].sort((a, b) => {
      const av = String(a[st.sortCol] || '').toLowerCase();
      const bv = String(b[st.sortCol] || '').toLowerCase();
      return av < bv ? -dir : av > bv ? dir : 0;
    });
  }

  return recs;
}

// ── HIGHLIGHT ─────────────────────────────────────────────────────────
function hl(text, q) {
  if (!q || !text) return escHtml(String(text ?? ''));
  const escaped = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return escHtml(String(text)).replace(
    new RegExp(escaped.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>'), 'gi'),
    m => `<mark>${m}</mark>`
  );
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── BADGE HELPERS ─────────────────────────────────────────────────────
function typeBadge(type) {
  if (!type) return '';
  const t = String(type).toLowerCase();
  let cls = 'b-default';
  if (t.includes('person')) cls = 'b-person';
  else if (t.includes('agent')) cls = 'b-agent';
  else if (t.includes('org')) cls = 'b-org';
  else if (t.includes('place')) cls = 'b-place';
  return `<span class="badge ${cls}">${escHtml(type)}</span>`;
}
function statusBadge(s) {
  if (!s) return '';
  const t = String(s).toLowerCase();
  let cls = 'b-default';
  if (t.includes('active') || t === 'open') cls = 'b-active';
  else if (t.includes('done') || t.includes('complet')) cls = 'b-done';
  else if (t.includes('pend') || t.includes('progress') || t.includes('stall')) cls = 'b-pending';
  else if (t.includes('inact') || t.includes('deprecat')) cls = 'b-inactive';
  return `<span class="badge ${cls}">${escHtml(s)}</span>`;
}
function priorityBadge(p) {
  if (!p) return '';
  const t = String(p).toLowerCase();
  let cls = 'b-default';
  if (t === 'high') cls = 'b-high';
  else if (t === 'medium') cls = 'b-medium';
  else if (t === 'low') cls = 'b-low';
  return `<span class="badge ${cls}">${escHtml(p)}</span>`;
}

// ── TABLE VIEW ────────────────────────────────────────────────────────
function renderTableView(id, records) {
  const cols = COLUMNS[id] || [{k:'name',l:'Имя'}];
  const st = sectionState[id];
  const sf = STATUS_FILTERS[id];
  const q = globalQuery;

  // Toolbar: фильтр по статусу
  const filterValues = sf && sf.values.length
    ? sf.values
    : [...new Set((DATA[id]||[]).map(r => r[sf?.field]).filter(Boolean))].slice(0, 8);

  const chipsHtml = filterValues.length > 1
    ? filterValues.map(v =>
        `<button class="chip${st.filterVal === v ? ' active' : ''}" onclick="setFilter('${id}','${v}')">${escHtml(v)}</button>`
      ).join('')
    : '';

  const thead = cols.map(c => {
    const sorted = st.sortCol === c.k;
    const arrow = sorted ? (st.sortDir === 'asc' ? '↑' : '↓') : '↕';
    return `<th onclick="sortCol('${id}','${c.k}')" class="${sorted?'sorted':''}">${c.l} <span class="sort-arrow">${arrow}</span></th>`;
  }).join('') + '<th style="width:40px"></th>';

  const rows = records.map(r => {
    const rowId = `r-${id}-${r._id}`;
    const cells = cols.map((c,i) => {
      let val = r[c.k] ?? '';
      let html = '';
      if (i === 0) {
        html = `<td class="td-name" onclick="toggleRow('${rowId}')">${hl(val, q)}</td>`;
      } else if (c.k === 'type') {
        html = `<td>${typeBadge(val)}</td>`;
      } else if (c.k === 'status') {
        html = `<td>${statusBadge(val)}</td>`;
      } else if (c.k === 'priority') {
        html = `<td>${priorityBadge(val)}</td>`;
      } else {
        const short = String(val).substring(0, 60) + (String(val).length > 60 ? '…' : '');
        html = `<td class="td-muted">${hl(short, q)}</td>`;
      }
      return html;
    }).join('');

    const hasGap = r.data_gaps && String(r.data_gaps).trim().length > 2;
    const expandBtn = `<td style="text-align:center"><span style="color:#2a2a2a;cursor:pointer;font-size:16px" onclick="toggleRow('${rowId}')">⋯</span>${hasGap ? ' <span class="badge b-gap">gap</span>' : ''}</td>`;

    // Detail row
    const skipKeys = new Set([...cols.map(c=>c.k), '_id']);
    const extraFields = Object.keys(r).filter(k => !skipKeys.has(k) && r[k] !== null && r[k] !== '' && r[k] !== undefined);
    const allFields = [...cols.map(c=>c.k).filter(k=>k!=='name'), ...extraFields].filter(k=>k!=='_id');
    const detailCells = allFields.map(k => {
      const v = r[k];
      if (v === null || v === undefined || v === '') return '';
      const isGap = k === 'data_gaps';
      return `<div class="detail-field">
        <div class="detail-key">${escHtml(k)}</div>
        <div class="detail-val ${isGap ? 'gap-val' : ''}">${hl(String(v).substring(0,500), q)}</div>
      </div>`;
    }).filter(Boolean).join('');

    const nameVal = r[cols[0].k] || `#${r._id}`;
    const existingGap = escHtml(String(r.data_gaps || '').substring(0, 100));

    return `<tr id="${rowId}">
      ${cells}${expandBtn}
    </tr>
    <tr class="row-detail" id="det-${rowId}">
      <td colspan="${cols.length + 1}">
        <div class="detail-grid">${detailCells || '<span style="color:#333">нет дополнительных полей</span>'}</div>
        <div class="detail-actions">
          <button class="btn-gap" onclick="openGap('${escHtml(String(nameVal)).replace(/'/g,"\\'")}','${id}','${existingGap.replace(/'/g,"\\'")}')">📝 Сообщить о дыре</button>
        </div>
      </td>
    </tr>`;
  }).join('');

  return `
    <div class="toolbar">
      <span class="toolbar-info">${records.length} из ${(DATA[id]||[]).length}</span>
      <div class="filter-chips">
        <button class="chip${st.filterVal === 'all' ? ' active' : ''}" onclick="setFilter('${id}','all')">Все</button>
        ${chipsHtml}
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>${thead}</tr></thead>
        <tbody>${rows || `<tr><td colspan="${cols.length+1}" style="padding:30px;text-align:center;color:#333">Ничего не найдено</td></tr>`}</tbody>
      </table>
    </div>`;
}

// ── CARDS VIEW ────────────────────────────────────────────────────────
function renderCardsView(id, records) {
  const cfg = CARD_CFG[id] || { title: 'name', body: '', badges: ['status'] };
  const st = sectionState[id];
  const sf = STATUS_FILTERS[id];
  const q = globalQuery;

  const filterValues = sf && sf.values.length
    ? sf.values
    : [...new Set((DATA[id]||[]).map(r => r[sf?.field]).filter(Boolean))].slice(0, 8);

  const chipsHtml = filterValues.length > 1
    ? filterValues.map(v =>
        `<button class="chip${st.filterVal === v ? ' active' : ''}" onclick="setFilter('${id}','${v}')">${escHtml(v)}</button>`
      ).join('')
    : '';

  const cards = records.map(r => {
    const cardId = `c-${id}-${r._id}`;
    const title = r[cfg.title] || `#${r._id}`;
    const body = r[cfg.body] || '';
    const hasGap = r.data_gaps && String(r.data_gaps).trim().length > 2;

    const badgesHtml = cfg.badges.map(b => {
      const v = r[b];
      if (!v) return '';
      if (b === 'status') return statusBadge(v);
      if (b === 'priority') return priorityBadge(v);
      return `<span class="badge b-default">${escHtml(v)}</span>`;
    }).join('');

    // Expand: все остальные поля
    const skipKeys = new Set([cfg.title, cfg.body, '_id']);
    const expandFields = Object.keys(r).filter(k => !skipKeys.has(k));
    const expandHtml = expandFields.map(k => {
      const v = r[k];
      if (!v && v !== 0) return '';
      const isGap = k === 'data_gaps';
      return `<div class="cfield">
        <div class="cfield-key">${escHtml(k)}</div>
        <div class="cfield-val ${isGap ? 'gap-val' : ''}">${hl(String(v).substring(0, 400), q)}</div>
      </div>`;
    }).filter(Boolean).join('');

    const nameEsc = escHtml(String(title)).replace(/'/g,"\\'");
    const existingGap = escHtml(String(r.data_gaps || '').substring(0, 100)).replace(/'/g,"\\'");

    return `<div class="card" id="${cardId}" onclick="toggleCard('${cardId}')">
      <div class="card-head">
        <div class="card-title">${hl(title, q)}</div>
        <div class="card-badges">${badgesHtml}${hasGap ? ' <span class="badge b-gap">gap</span>' : ''}</div>
      </div>
      ${body ? `<div class="card-body">${hl(String(body).substring(0,120), q)}${String(body).length>120?'…':''}</div>` : ''}
      <div class="card-expand">
        ${body ? `<div class="cfield"><div class="cfield-key">${escHtml(cfg.body)}</div><div class="cfield-val card-body full">${hl(body, q)}</div></div>` : ''}
        ${expandHtml}
        <button class="btn-gap" onclick="event.stopPropagation();openGap('${nameEsc}','${id}','${existingGap}')">📝 Сообщить о дыре</button>
      </div>
    </div>`;
  }).join('');

  return `
    <div class="toolbar">
      <span class="toolbar-info">${records.length} из ${(DATA[id]||[]).length}</span>
      <div class="filter-chips">
        <button class="chip${st.filterVal === 'all' ? ' active' : ''}" onclick="setFilter('${id}','all')">Все</button>
        ${chipsHtml}
      </div>
    </div>
    <div class="cards-grid">
      ${cards || '<div style="grid-column:1/-1;padding:40px;text-align:center;color:#333">Ничего не найдено</div>'}
    </div>`;
}

// ── INTERACTIONS ──────────────────────────────────────────────────────
function toggleRow(rowId) {
  const row = document.getElementById(rowId);
  const det = document.getElementById('det-' + rowId);
  if (!det) return;
  const isOpen = det.classList.contains('open');
  det.classList.toggle('open', !isOpen);
  if (row) row.classList.toggle('expanded', !isOpen);
}

function toggleCard(cardId) {
  const card = document.getElementById(cardId);
  if (card) card.classList.toggle('open');
}

function attachEvents(id) {} // events are inline

function setFilter(id, val) {
  sectionState[id].filterVal = val;
  renderSection(id);
}

function sortCol(id, col) {
  const st = sectionState[id];
  if (st.sortCol === col) {
    st.sortDir = st.sortDir === 'asc' ? 'desc' : 'asc';
  } else {
    st.sortCol = col;
    st.sortDir = 'asc';
  }
  renderSection(id);
}

// ── GLOBAL SEARCH ─────────────────────────────────────────────────────
let searchTimer;
document.getElementById('gsearch').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    globalQuery = e.target.value.trim();
    document.getElementById('sclear').classList.toggle('visible', !!globalQuery);

    // Подсчёт совпадений по всем таблицам
    if (globalQuery) {
      const q = globalQuery.toLowerCase();
      const matches = Object.entries(DATA).map(([t, recs]) => {
        const n = recs.filter(r => Object.values(r).some(v => v && String(v).toLowerCase().includes(q))).length;
        return n > 0 ? `${TABLES.find(x=>x.id===t)?.label||t}: ${n}` : null;
      }).filter(Boolean);
      document.getElementById('global-match').textContent = matches.join(' · ');
    } else {
      document.getElementById('global-match').textContent = '';
    }

    renderSection(activeTab);
  }, 180);
});

function clearSearch() {
  document.getElementById('gsearch').value = '';
  globalQuery = '';
  document.getElementById('sclear').classList.remove('visible');
  document.getElementById('global-match').textContent = '';
  renderSection(activeTab);
}

// ── GAP MODAL ─────────────────────────────────────────────────────────
function openGap(name, table, existingGap) {
  const label = TABLES.find(t => t.id === table)?.label || table;
  document.getElementById('gap-obj').textContent = `${name} · ${label}`;
  const text = existingGap && existingGap.length > 3
    ? `[GAP] ${name} (${table}):\n\nУже отмечено: ${existingGap}\n\nМои дополнения: `
    : `[GAP] ${name} (${table}): `;
  document.getElementById('gap-text').value = text;
  document.getElementById('gap-copy-btn').textContent = 'Скопировать';
  document.getElementById('gap-modal').classList.add('open');
}
function closeGap() { document.getElementById('gap-modal').classList.remove('open'); }
function copyGap() {
  navigator.clipboard.writeText(document.getElementById('gap-text').value).then(() => {
    const btn = document.getElementById('gap-copy-btn');
    btn.textContent = '✓ Скопировано';
    btn.style.color = '#aaeaaa';
  });
}
document.getElementById('gap-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('gap-modal')) closeGap();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeGap(); });

// ── INIT ──────────────────────────────────────────────────────────────
loadRegistry();
</script>
</body>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Echo Registry — Единый реестр</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d0d0d;
    color: #e0e0e0;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 14px;
    min-height: 100vh;
  }
  header {
    padding: 24px 32px 16px;
    border-bottom: 1px solid #222;
    display: flex;
    align-items: baseline;
    gap: 16px;
  }
  header h1 { font-size: 20px; font-weight: 600; color: #fff; }
  header .sub { color: #555; font-size: 12px; }

  .controls {
    padding: 16px 32px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
    border-bottom: 1px solid #1a1a1a;
    position: sticky;
    top: 0;
    background: #0d0d0d;
    z-index: 10;
  }
  .search-wrap { position: relative; flex: 1; min-width: 200px; max-width: 420px; }
  .search-wrap input {
    width: 100%;
    background: #161616;
    border: 1px solid #2a2a2a;
    color: #e0e0e0;
    padding: 8px 12px 8px 34px;
    border-radius: 6px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-wrap input:focus { border-color: #444; }
  .search-wrap .icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #444; font-size: 15px; }

  .filters { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn {
    background: #161616;
    border: 1px solid #2a2a2a;
    color: #888;
    padding: 6px 12px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 12px;
    font-family: inherit;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: #444; color: #ccc; }
  .filter-btn.active { background: #1e3a1e; border-color: #3a7a3a; color: #7dba7d; }

  .stats {
    padding: 8px 32px;
    color: #444;
    font-size: 11px;
    border-bottom: 1px solid #111;
  }

  .results {
    padding: 16px 32px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 10px;
  }

  .card {
    background: #111;
    border: 1px solid #1e1e1e;
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .card:hover { border-color: #333; }
  .card.open { border-color: #2a4a2a; }

  .card-header {
    padding: 12px 14px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
  }
  .card-name { font-weight: 600; color: #ddd; font-size: 13px; line-height: 1.3; }
  .card-meta { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
  .badge {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 3px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .badge-entities  { background: #1a2a3a; color: #7ab3d4; }
  .badge-assets2   { background: #2a2a1a; color: #c4b96a; }
  .badge-commitments { background: #2a1a2a; color: #b97ab3; }
  .badge-projects  { background: #1a3a2a; color: #7ab393; }
  .badge-positions { background: #3a1a1a; color: #d47a7a; }
  .badge-channels  { background: #1a1a3a; color: #7a7ad4; }

  .status-badge {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 3px;
    background: #1e1e1e;
    color: #666;
  }
  .status-active { background: #1a2e1a; color: #5a9a5a; }
  .status-pending, .status-in_progress { background: #2e2a1a; color: #9a8a4a; }
  .status-done, .status-completed { background: #1a1e2e; color: #4a6a9a; }
  .status-inactive, .status-deprecated { background: #1e1a1a; color: #666; }

  .card-summary {
    padding: 0 14px 10px;
    color: #555;
    font-size: 12px;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card.open .card-summary { display: none; }

  .card-details {
    display: none;
    padding: 0 14px 12px;
    border-top: 1px solid #1a1a1a;
  }
  .card.open .card-details { display: block; }

  .field-row {
    display: flex;
    gap: 8px;
    padding: 5px 0;
    border-bottom: 1px solid #151515;
    font-size: 12px;
    line-height: 1.4;
  }
  .field-row:last-child { border-bottom: none; }
  .field-key { color: #444; min-width: 110px; flex-shrink: 0; }
  .field-val { color: #bbb; word-break: break-word; }
  .field-val.gap { color: #8a3a3a; }

  .card-actions {
    padding: 8px 14px 12px;
    display: flex;
    gap: 8px;
  }
  .btn-gap {
    background: none;
    border: 1px solid #2a1a1a;
    color: #8a4a4a;
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 11px;
    font-family: inherit;
    transition: all 0.15s;
  }
  .btn-gap:hover { border-color: #5a2a2a; color: #cc7a7a; }

  .empty { padding: 60px 32px; text-align: center; color: #333; }
  .empty .icon { font-size: 32px; margin-bottom: 12px; }

  .gap-modal {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .gap-modal.open { display: flex; }
  .gap-box {
    background: #141414;
    border: 1px solid #2a2a2a;
    border-radius: 10px;
    padding: 24px;
    width: 100%;
    max-width: 480px;
    margin: 16px;
  }
  .gap-box h3 { color: #ccc; margin-bottom: 6px; font-size: 15px; }
  .gap-box p { color: #555; font-size: 12px; margin-bottom: 14px; }
  .gap-box textarea {
    width: 100%;
    background: #0d0d0d;
    border: 1px solid #2a2a2a;
    color: #ddd;
    padding: 10px;
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
    resize: vertical;
    min-height: 80px;
    outline: none;
    margin-bottom: 12px;
  }
  .gap-box textarea:focus { border-color: #444; }
  .gap-buttons { display: flex; gap: 8px; justify-content: flex-end; }
  .btn-copy {
    background: #1e3a1e;
    border: 1px solid #3a7a3a;
    color: #7dba7d;
    padding: 7px 16px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 12px;
    font-family: inherit;
  }
  .btn-cancel {
    background: none;
    border: 1px solid #2a2a2a;
    color: #666;
    padding: 7px 16px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 12px;
    font-family: inherit;
  }
  .copied { color: #7dba7d !important; }

  footer {
    padding: 24px 32px;
    border-top: 1px solid #111;
    color: #333;
    font-size: 11px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  footer a { color: #444; text-decoration: none; }
  footer a:hover { color: #888; }

  @media (max-width: 600px) {
    .controls, .results, .stats, footer { padding-left: 16px; padding-right: 16px; }
    header { padding: 16px; }
    .results { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <h1>🌀 Echo Registry</h1>
  <span class="sub">Единый реестр · <span id="last-updated">загрузка...</span></span>
</header>

<div class="controls">
  <div class="search-wrap">
    <span class="icon">⌕</span>
    <input type="text" id="search" placeholder="Поиск по реестру..." autocomplete="off" autofocus>
  </div>
  <div class="filters" id="filters">
    <button class="filter-btn active" data-table="all">Всё</button>
    <button class="filter-btn" data-table="Entities">Люди &amp; орги</button>
    <button class="filter-btn" data-table="Assets2">Активы</button>
    <button class="filter-btn" data-table="Commitments">Обязательства</button>
    <button class="filter-btn" data-table="Projects">Проекты</button>
    <button class="filter-btn" data-table="Positions">Позиции</button>
    <button class="filter-btn" data-table="Channels">Каналы</button>
  </div>
</div>

<div class="stats" id="stats">Загрузка данных...</div>

<div class="results" id="results">
  <div class="empty"><div class="icon">⟳</div><div>Загрузка реестра...</div></div>
</div>

<!-- Gap modal -->
<div class="gap-modal" id="gap-modal">
  <div class="gap-box">
    <h3>📝 Сообщить о дыре</h3>
    <p id="gap-object-name" style="color:#888; margin-bottom:8px;"></p>
    <p>Опишите что не так или чего не хватает. Скопируйте текст и отправьте в <a href="https://t.me/Echo_MTL_bot" target="_blank" style="color:#7ab3d4;">@Echo_MTL_bot</a></p>
    <textarea id="gap-text" readonly></textarea>
    <div class="gap-buttons">
      <button class="btn-cancel" onclick="closeGap()">Закрыть</button>
      <button class="btn-copy" onclick="copyGap()" id="copy-btn">Скопировать</button>
    </div>
  </div>
</div>

<footer>
  <div>Данные: <a href="https://montelibero.getgrist.com/8tr2cqDjxtKA9RzGSaVDS5" target="_blank">Grist</a> · Автор: <a href="https://t.me/echo_mtl" target="_blank">@echo_mtl</a></div>
  <div><a href="index.html">← на главную</a></div>
</footer>

<script>
const TABLE_LABELS = {
  Entities: 'Люди & орги',
  Assets2: 'Активы',
  Commitments: 'Обязательства',
  Projects: 'Проекты',
  Positions: 'Позиции',
  Channels: 'Каналы',
};

// Ключевые поля для превью карточки
const PREVIEW_FIELDS = {
  Entities:    ['type', 'trust_level', 'strategic_value'],
  Assets2:     ['type', 'status', 'value', 'location'],
  Commitments: ['status', 'priority', 'deadline', 'strategy_axis'],
  Projects:    ['status', 'priority', 'strategy_axis', 'metrics'],
  Positions:   ['topic', 'status', 'evidence'],
  Channels:    ['platform', 'access', 'strategic_value'],
};

// Поля с потенциальными дырами
const GAP_FIELDS = ['data_gaps', 'gap', 'notes', 'description'];

let allData = {};
let activeTable = 'all';
let searchQuery = '';

async function loadRegistry() {
  try {
    const r = await fetch('data/registry.json?t=' + Date.now());
    allData = await r.json();
    const totalRecords = Object.values(allData).reduce((s, arr) => s + arr.length, 0);
    const tables = Object.keys(allData).length;
    document.getElementById('last-updated').textContent =
      `${totalRecords} объектов в ${tables} таблицах`;
    render();
  } catch(e) {
    document.getElementById('results').innerHTML =
      '<div class="empty"><div class="icon">⚠</div><div>Не удалось загрузить реестр</div></div>';
  }
}

function getStatusClass(status) {
  if (!status) return '';
  const s = String(status).toLowerCase();
  if (s.includes('active')) return 'status-active';
  if (s.includes('done') || s.includes('complet')) return 'status-done';
  if (s.includes('pend') || s.includes('progress')) return 'status-pending';
  if (s.includes('inact') || s.includes('deprecat')) return 'status-inactive';
  return '';
}

function highlight(text, q) {
  if (!q || !text) return String(text || '');
  const escaped = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return String(text).replace(new RegExp(escaped, 'gi'), m => `<mark style="background:#3a3a1a;color:#e0c060;border-radius:2px;">${m}</mark>`);
}

function getNameField(rec, table) {
  return rec.name || rec.title || rec.description || rec.topic || rec.label || `#${rec._id}`;
}

function recordMatchesSearch(rec, q) {
  if (!q) return true;
  const ql = q.toLowerCase();
  return Object.values(rec).some(v =>
    v && String(v).toLowerCase().includes(ql)
  );
}

function render() {
  const q = searchQuery.trim();
  let allCards = [];

  const tables = activeTable === 'all' ? Object.keys(allData) : [activeTable];
  for (const table of tables) {
    if (!allData[table]) continue;
    for (const rec of allData[table]) {
      if (!recordMatchesSearch(rec, q)) continue;
      allCards.push({ table, rec });
    }
  }

  document.getElementById('stats').textContent =
    q || activeTable !== 'all'
      ? `Найдено: ${allCards.length} из ${Object.values(allData).reduce((s,a)=>s+a.length,0)}`
      : `Всего: ${allCards.length} объектов`;

  if (allCards.length === 0) {
    document.getElementById('results').innerHTML =
      '<div class="empty" style="grid-column:1/-1"><div class="icon">∅</div><div>Ничего не найдено</div></div>';
    return;
  }

  const html = allCards.map(({ table, rec }) => {
    const name = getNameField(rec, table);
    const badgeClass = `badge-${table.toLowerCase()}`;
    const tableLabel = TABLE_LABELS[table] || table;
    const status = rec.status || rec.trust_level || '';
    const statusClass = getStatusClass(status);
    const id = `card-${table}-${rec._id}`;

    // Поле summary
    const summaryField = rec.description || rec.topic || rec.position || rec.strategic_value || rec.notes || '';
    const summaryHtml = summaryField
      ? `<div class="card-summary">${highlight(summaryField.substring(0, 140), q)}</div>`
      : '';

    // Детали
    const skipFields = new Set(['_id', 'name', 'title', 'label']);
    const previewF = PREVIEW_FIELDS[table] || [];
    const allFieldKeys = [...new Set([...previewF, ...Object.keys(rec).filter(k => !skipFields.has(k))])];

    const fieldsHtml = allFieldKeys.map(k => {
      const v = rec[k];
      if (v === undefined || v === null || v === '' || (Array.isArray(v) && !v.length)) return '';
      const isGap = k === 'data_gaps' && v;
      return `<div class="field-row">
        <span class="field-key">${k}</span>
        <span class="field-val ${isGap ? 'gap' : ''}">${highlight(String(v).substring(0, 300), q)}</span>
      </div>`;
    }).join('');

    const hasGap = rec.data_gaps && String(rec.data_gaps).length > 2;

    return `<div class="card" id="${id}" onclick="toggleCard('${id}')">
      <div class="card-header">
        <div class="card-name">${highlight(name, q)}</div>
        <div class="card-meta">
          ${status ? `<span class="badge status-badge ${statusClass}">${status}</span>` : ''}
          <span class="badge ${badgeClass}">${tableLabel}</span>
        </div>
      </div>
      ${summaryHtml}
      <div class="card-details">
        ${fieldsHtml || '<div style="color:#444;font-size:12px;padding:8px 0;">Нет дополнительных данных</div>'}
        <div class="card-actions" onclick="event.stopPropagation()">
          <button class="btn-gap" onclick="openGap('${name.replace(/'/g,"\\'")}', '${table}', '${(rec.data_gaps||'').replace(/'/g,"\\'").substring(0,100)}')">📝 Сообщить о дыре</button>
          ${hasGap ? `<span style="color:#8a3a3a;font-size:11px;align-self:center;">⚠ есть data_gap</span>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('results').innerHTML = html;
}

function toggleCard(id) {
  const card = document.getElementById(id);
  if (card) card.classList.toggle('open');
}

// Фильтры
document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeTable = btn.dataset.table;
  render();
});

// Поиск
let searchTimer;
document.getElementById('search').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchQuery = e.target.value;
    render();
  }, 200);
});

// Gap modal
function openGap(name, table, existingGap) {
  document.getElementById('gap-object-name').textContent = `${name} [${TABLE_LABELS[table] || table}]`;
  const text = existingGap
    ? `[GAP] ${name} (${table}): \n\nУже отмечено: ${existingGap}\n\nМои дополнения: `
    : `[GAP] ${name} (${table}): `;
  document.getElementById('gap-text').value = text;
  document.getElementById('gap-modal').classList.add('open');
  document.getElementById('copy-btn').textContent = 'Скопировать';
  document.getElementById('copy-btn').classList.remove('copied');
}
function closeGap() {
  document.getElementById('gap-modal').classList.remove('open');
}
function copyGap() {
  const t = document.getElementById('gap-text');
  navigator.clipboard.writeText(t.value).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = '✓ Скопировано';
    btn.classList.add('copied');
  });
}
document.getElementById('gap-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('gap-modal')) closeGap();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeGap(); });

loadRegistry();
</script>
</body>
</html>
